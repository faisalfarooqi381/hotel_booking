{% extends 'base.html' %}
{% block content %}


<h2>Available Rooms</h2>

<!-- 🔎 Search Availability Form -->
<div class="card p-4 shadow mb-4">
    <h4>Check Room Availability</h4>

    <form method="get">
        <div class="row">
            <div class="col-md-4">
                <label>Check-In Date</label>
                {{ form.check_in }}
            </div>

            <div class="col-md-4">
                <label>Check-Out Date</label>
                {{ form.check_out }}
            </div>

            <div class="col-md-4 d-flex align-items-end">
                <button type="submit" class="btn btn-success w-100">
                    Search Available Rooms
                </button>
            </div>
        </div>
    </form>
</div>

<!-- 🏨 Rooms List -->

<div class="row">
    {% for room in rooms %}
    <div class="col-md-2">
        <div class="card mb-3">
            <div class="card-body shadow">
                <h5>Room {{ room.room_number }}</h5>
                <p>Type: {{ room.room_type.name }}</p>
                <p>Price: {{ room.price }}</p>

                <!-- <a href="{% url 'book_room' room.id %}" class="btn btn-primary">
                    Book Now
                </a> -->

                <a href="{% url 'book_room' room.id %}?check_in={{ request.GET.check_in }}&check_out={{ request.GET.check_out }}"
                    class="btn btn-primary">
                    Book Now
                </a>

            </div>
        </div>
    </div>
    {% endfor %}

    {% endblock %}
